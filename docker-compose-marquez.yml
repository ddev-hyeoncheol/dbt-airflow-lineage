services:
  marquez-db:
    image: postgres:16
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "marquez"]
      interval: 10s
      retries: 5
    networks:
      - lineage-network

  marquez:
    image: marquezproject/marquez:0.50.0
    ports:
      - "5001:5000"
    environment:
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    depends_on:
      marquez-db:
        condition: service_healthy
    networks:
      - lineage-network

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
    depends_on:
      - marquez
    networks:
      - lineage-network

networks:
  lineage-network:
    name: lineage-network
    external: true
